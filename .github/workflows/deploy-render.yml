name: Deploy to Render & GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# GitHub Pages deployment permissions
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-backend:
    name: Deploy Backend Services
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render Deployment - Gateway
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_GATEWAY }}
        
      - name: Trigger Render Deployment - UrlShortener
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URLSHORTENER }}
        
      - name: Trigger Render Deployment - Redirect
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_REDIRECT }}

      - name: Backend Deployment Complete
        run: echo "✅ All backend services triggered deployment on Render!"

  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy-backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: src/Frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/Frontend
        run: npm ci

      - name: Build Frontend
        working-directory: src/Frontend
        env:
          VITE_API_URL: https://urlshortener-gateway.onrender.com
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/Frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Frontend Deployment Complete
        run: echo "✅ Frontend deployed to GitHub Pages!"
