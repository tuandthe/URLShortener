name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render Deployment - Gateway
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_GATEWAY }}
        
      - name: Trigger Render Deployment - UrlShortener
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URLSHORTENER }}
        
      - name: Trigger Render Deployment - Redirect
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_REDIRECT }}
        
      - name: Trigger Render Deployment - Analytics
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_ANALYTICS }}

      - name: Deployment Complete
        run: echo "✅ All services triggered deployment on Render!"
